site_name: SLOGo
site_description: Go utilities for OpenSLO Service Level Objectives
site_url: https://grokify.github.io/slogo/
repo_url: https://github.com/grokify/slogo
repo_name: grokify/slogo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Ontology:
      - Overview: ontology/overview.md
      - Domain Packages: ontology/domains.md
  - Examples:
      - Overview: examples/index.md
      - RED Metrics: examples/red-metrics.md
      - USE Metrics: examples/use-metrics.md
      - AI Agents: examples/ai-agents.md
      - SaaS CRM: examples/saas-crm.md
      - Budgeting Methods: examples/budgeting-methods.md
      - Metrics Report: examples/metrics-report.md
  - API Reference: api-reference.md
  - Releases:
      - Changelog: releases/changelog.md
      - v0.3.0: releases/v0.3.0.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/slogo
  generator: false
